# Resource bundle for the Federation plugin's registered SystemProperty descriptions.
# Openfire's SystemProperty.Builder.setPlugin("federation") loads this bundle ("federation_i18n")
# to show each property's description on the System Properties page; without it, registration
# logs a MissingResourceException for every property.

plugin.federation.peerAllowlist=When enabled, only approved (configured) peers may federate; federation actions from any other server are rejected.
plugin.federation.disableS2SIdle=Disable Openfire's server-wide S2S idle reaper on startup so federation links are not closed as idle (applied at startup).
plugin.federation.keepaliveSeconds=Interval, in seconds, between S2S keepalive pings sent to each reachable federation peer.
plugin.federation.reconnectSeconds=Back-off cap, in seconds, for reconnecting UNREACHABLE federation peers (retries grow 5,10,20,... up to this value).
