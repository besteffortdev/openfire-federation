# Resource bundle for the Federation plugin's registered SystemProperty descriptions.
# Openfire looks up each property's description under the key "system_property.<property-key>",
# and loads this bundle ("federation_i18n") because the properties are registered with
# setPlugin("federation"). Without it, registration logs MissingResourceException / Missing-key
# warnings and the properties show without descriptions on the System Properties page.

system_property.plugin.federation.peerAllowlist=When enabled, only approved (configured) peers may federate; federation actions from any other server are rejected. When disabled, federation is open and any server that can connect is accepted.
system_property.plugin.federation.disableS2SIdle=Disable Openfire's server-wide S2S idle reaper on startup so federation links are not closed as idle (applied at startup; requires a restart to change).
system_property.plugin.federation.keepaliveSeconds=Interval, in seconds, between S2S keepalive pings sent to each reachable federation peer.
system_property.plugin.federation.reconnectSeconds=Back-off cap, in seconds, for reconnecting UNREACHABLE federation peers (retries grow 5,10,20,... up to this value).
system_property.plugin.federation.directRemoteMucBlocked=When enabled, a user on another server cannot join or post to a local MUC room directly over S2S; the room is only reachable through a federation mapping.
system_property.plugin.federation.directMessageRelay=When enabled, a 1:1 message to a user on an overlay-reachable peer is relayed hop-by-hop through federation (works across untrusted edges with no direct S2S).
system_property.plugin.federation.directoryPublish=When enabled, this server gossips its list of currently-online users to trusted peers so they can see who is reachable here. Off by default for privacy.
system_property.plugin.federation.bookmarkPush=When enabled, this server advertises its connected clients to trusted peers as XEP-0048 bookmarks, injected into each peer user's bookmark storage. Off by default for privacy.
system_property.plugin.federation.probeOnSubscribe=When a local user subscribes to a contact on a multi-hop peer, re-issue Openfire's presence probe over the federation overlay (its native probe leaks to S2S and fails). On by default.
